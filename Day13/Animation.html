<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .div{
            height:100px;
            width: 100px;
            border:2px solid red;
            animation-name: box;
            animation-duration: 4s;
            animation-timing-function: linear;
            animation-iteration-count: 4;
            position: relative;
        }

        @keyframes box{
            0%{
                top:0;
            }
            25%{
                top:0;
                left:300px;
            }
            50%{
                top:300px;
                left:300px;
            }

            75%{
                top:300px;
                left:0;
            }

            100%{
                top:0;
                left:0;
            }
        }
    </style>

    <div class="div">

    </div>
</body>
</html>
