<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Moon</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.moon{
    width:150px;
    height:150px;
    background:red;
    border-radius:50%;
    cursor:pointer;
    position:relative;
    transition:all 0.5s ease;
    box-shadow:0px 0px 20px red;
}

.moon::after{
    content:"";
    position:absolute;
    top:0;
    left:50px;
    width:150px;
    height:150px;
    background:black;
    border-radius:50%;
    transition:0.5s;
}


.full::after{
    left:160px;
}

</style>
</head>

<body>

<div class="moon" onclick="toggleMoon()"></div>

<script>

function toggleMoon(){
    document.querySelector(".moon").classList.toggle("full");
}

</script>

</body>
</html>
