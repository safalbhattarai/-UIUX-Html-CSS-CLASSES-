 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}


.nav{
    height:60px;
    background-color:rgb(148,123,90);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
}

.logo{
    color:white;
    font-size:20px;
    font-weight:bold;
}

.navlinks ul{
    list-style:none;
    display:flex;
    gap:25px;
}

.navlinks li{
    color:white;
    cursor:pointer;
}


button{
    background-color:red;
    color:white;
    border:none;
    padding:10px 22px;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}


.hero{
    min-height:calc(100vh - 60px);
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 60px;
    padding:40px;
    background-color:#f5f5f5;
}


.heroimg{
    width:520px;
    padding:15px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.heroimg img{
    width:100%;
    border-radius:15px;
}


.herotext{
    max-width:420px;
}

.herotext h2{
    margin-bottom:15px;
    font-size:28px;
}

.herotext p{
    margin-bottom:25px;
    line-height:1.6;
    color:#444;
}

</style>
</head>

<body>


<div class="nav">

<div class="logo">Logo</div>

<div class="navlinks">
<ul>
<li>Home</li>
<li>About</li>
<li>Service</li>
<li>Contact Us</li>
</ul>
</div>

<button>Sign Up</button>

</div>


<div class="hero">

<div class="heroimg">
<img src="image.png" alt="Hero Image">
</div>

<div class="herotext">
<h2>Main Content</h2>

<p>
Lorem ipsum dolor sit amet consectetur adipisicing elit.
Odio, deserunt ex accusamus cum hic possimus ducimus
facilis sapiente.
</p>

<button>Get Started</button>

</div>

</div>

</body>
</html>
