<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h3>Form</h3>


    <form action="/">

        <label for="name">Name :</label>
        <input type="text" placeholder="Enter your Name" id="name">
        <br>

        <label for="number">Number:</label>
        <input type="number" placeholder="Enter your Number" id="number" min="0">

        <label for="email">Email:</label>
        <input type="email" placeholder="Enter Your Email" id="email">

        <label for="password">Password:</label>
        <input type="password" placeholder="Enter your password" id="password">


        <fieldset>
            <legend>Are You Sure?</legend>

            <label for="yes">Yes</label>
            <input type="radio" id="yes" name="confirm">

            <label for="no">No</label>
            <input type="radio" id="no" name="confirm">
        </fieldset>


        <fieldset>
            <legend>Courses</legend>

            <label for="python">Python</label>
            <input type="checkbox"  id="python">
            <br>

            <label for="Java">Java</label>
            <input type="checkbox"  id="Java">
            <br>

            <label for="UI/UX Design">UI/UX Design</label>
            <input type="checkbox"  id="UI/UX Design">

        </fieldset>

        <label for="date">Date</label>
        <input type="date" id="date">

        <label for="time">time</label>
        <input type="time" id="time">

        <label for="datetime">datetime</label>
        <input type="datetime-local" id="datetime">

        <label for="file">file</label>
        <input type="file" id="file">

        <label for="color">color</label>
        <input type="color" id="color">

        <label for="range">range</label>
        <input type="range" id="range">

        <label for="search">Search</label>
        <input type="search" id="search">


        
        <button type="submit">Submit</button>




    </form>
    
   
</body>
</html>
